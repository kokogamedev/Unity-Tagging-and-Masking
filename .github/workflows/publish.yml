name: Auto-Publish to Verdaccio
# 1. THE TRIGGER
on:
  push:
    branches: [ "master" ]

# 2. THE JOB DEFINITION
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the workflow to push version bumps + tags

    # 3. THE STEPS (The Recipe)
    steps:
      # Step A: Get the Code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # Helps with push

      # Step B: Install Node.js & Configure Registry
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.psigenvision.com'
          cache: 'npm' # ← This line for faster dependency installs

      # Step C: Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Step D: Bump Version & Commit Tag
      - name: Auto-Bump Version
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          npm version patch
          git push --follow-tags

      # Step E: Publish to Verdaccio
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}